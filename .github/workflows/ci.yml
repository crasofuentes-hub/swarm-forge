name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Install Ray on supported CI interpreters
        run: python -m pip install "ray[default]>=2.20.0"

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile check
        run: python -m py_compile swarm_forge\core.py

      - name: Run tests
        run: python -m pytest